version: "3.9"

services:

  # ----------------------------------------------------------------
  # Capa 3 · MongoDB
  # ----------------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: sentiment_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./infra/init_mongo.js:/docker-entrypoint-initdb.d/init_mongo.js:ro
    environment:
      MONGO_INITDB_DATABASE: sentimentstream
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # Capa 4 · API Flask
  # ----------------------------------------------------------------
  api:
    build: ./api
    container_name: sentiment_api
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./api/app.py:/app/app.py   # hot-reload en desarrollo

volumes:
  mongo_data:
